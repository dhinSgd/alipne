name: Build Alpine Linux Image

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Free disk space
      run: |
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /opt/ghc
        sudo rm -rf /usr/local/share/boost
        sudo apt-get clean
        df -h

    - name: Prepare build environment
      run: |
        sudo bash scripts/01-prepare-host.sh

    - name: Build root filesystem
      run: |
        sudo bash scripts/02-build-rootfs.sh

    - name: Setup bootloader
      run: |
        sudo bash scripts/03-setup-bootloader.sh

    - name: Cleanup and optimize
      run: |
        sudo bash scripts/04-cleanup.sh

    - name: Pack image
      run: |
        sudo bash scripts/05-pack-image.sh

    - name: Check image info
      run: |
        ls -lh output/
        qemu-img info output/alipne.qcow2
        qemu-img check output/alipne.qcow2

    - name: Verify image contents
      run: |
        sudo apt-get update
        sudo apt-get install -y libguestfs-tools

        echo "==> 检查镜像内部文件..."
        sudo virt-ls -a output/alipne.qcow2 / || echo "⚠ virt-ls 失败，跳过"

        echo "==> 验证关键文件存在..."
        sudo virt-cat -a output/alipne.qcow2 /etc/hostname || echo "⚠ 无法读取 hostname"
        sudo virt-cat -a output/alipne.qcow2 /etc/fstab | head -5 || echo "⚠ 无法读取 fstab"
        sudo virt-cat -a output/alipne.qcow2 /etc/modules | head -10 || echo "⚠ 无法读取 modules"

        echo "==> 检查软件包..."
        sudo virt-cat -a output/alipne.qcow2 /etc/apk/world | head -10 || echo "⚠ 无法读取 world"

        echo "✓ 镜像验证完成"

    - name: Upload RAW image artifact (for Aliyun)
      uses: actions/upload-artifact@v4
      with:
        name: alipne-raw-image
        path: output/alipne.raw
        retention-days: 30

    - name: Upload QCOW2 image artifact (compressed, for local testing)
      uses: actions/upload-artifact@v4
      with:
        name: alipne-qcow2-image
        path: output/alipne.qcow2
        retention-days: 30

    - name: Upload QCOW2 nocompress image artifact (uncompressed btrfs)
      uses: actions/upload-artifact@v4
      with:
        name: alipne-qcow2-nocompress-image
        path: output/alipne-nocompress.qcow2
        retention-days: 30

    - name: Create Release
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v0.1.0-${{ github.run_number }}
        name: Alpine Linux Minimal Image v0.1.0-${{ github.run_number }}
        body: |
          ## alipne - 极简 Alpine Linux 系统镜像

          **构建日期**: ${{ github.event.head_commit.timestamp }}
          **提交**: ${{ github.sha }}

          ### 系统特性
          - Alpine Linux v3.20
          - UEFI/GPT 启动
          - btrfs + zstd:3 压缩（可选）
          - zram 内存压缩 384MB (swappiness=80)
          - 系统占用 ~80-100 MB
          - 总可用内存 ~850-900 MB

          ### 镜像格式（三个版本）
          - **alipne.raw** - RAW 格式，**用于阿里云导入**（推荐）
            - btrfs + zstd:3 压缩
            - 镜像格式选择: RAW
          - **alipne.qcow2** - QCOW2 格式
            - btrfs + zstd:3 压缩
            - 体积小（~200MB）
            - 用于本地 QEMU 测试
          - **alipne-nocompress.qcow2** - QCOW2 格式
            - **ext4 文件系统**（无 btrfs）
            - 启动快、读写性能好
            - 适合性能优先场景

          ### 使用方法（阿里云）
          1. 下载 `alipne.raw`
          2. 上传到阿里云 OSS
          3. 导入自定义镜像：
             - 镜像格式: **RAW**
             - 启动模式: **UEFI**
             - 系统盘大小: 1 GiB
          4. 创建 ECS 实例

          ### 默认登录
          - 用户名: root
          - 密码: SlimAlpine123
          - **首次登录后请立即修改密码！**

          ### 推荐方案
          如果导入镜像遇到问题，推荐使用官方镜像 + 优化脚本：
          ```bash
          wget https://raw.githubusercontent.com/dhinSgd/alipne/main/alpine-optimize.sh
          chmod +x alpine-optimize.sh
          ./alpine-optimize.sh
          ```

          详细文档请查看仓库 README.md 和 MANUAL_SETUP.md
        files: |
          output/alipne.raw
          output/alipne.qcow2
          output/alipne-nocompress.qcow2
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
